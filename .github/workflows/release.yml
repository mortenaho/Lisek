name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist

      - name: Prepare stable download filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist-installer/*.exe | Select-Object -First 1
          if (-not $installer) { throw 'Installer not found in dist-installer/' }
          Copy-Item $installer.FullName dist-installer/FluxAPI-Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist-installer/*.exe
