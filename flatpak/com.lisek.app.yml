# Packaging for Flathub (extra-data from GitHub Linux tarball).
# Copy these files to the Flathub submission repo root when opening the PR.
id: com.lisek.app
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: lisek
separate-locales: false
finish-args:
  # Network for API requests, local mock server, and update checks
  - --share=network
  # GUI
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # File import/export uses xdg-desktop-portal (no blanket home access)
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: lisek
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh "${FLATPAK_DEST}/bin/apply_extra"
      - install -Dm755 lisek.sh "${FLATPAK_DEST}/bin/lisek"
      - install -Dm644 com.lisek.app.desktop "${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop"
      - install -Dm644 com.lisek.app.metainfo.xml "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      - install -Dm644 com.lisek.app.png "${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png"
    sources:
      - type: script
        dest-filename: lisek.sh
        commands:
          - exec zypak-wrapper.sh /app/extra/lisek/lisek "$@"

      - type: file
        path: apply_extra.sh

      - type: file
        path: com.lisek.app.desktop

      - type: file
        path: com.lisek.app.metainfo.xml

      - type: file
        path: com.lisek.app.png

      - type: extra-data
        filename: Lisek-linux.tar.gz
        url: https://github.com/mortenaho/Lisek/releases/download/v1.6.3/Lisek-linux.tar.gz
        sha256: 810fcdbfd2af3cf548d18b8dec2fce28d99e48e540e856f957fd2e5d8aa01c31
        size: 114361324
